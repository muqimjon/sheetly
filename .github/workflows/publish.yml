name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.2.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(\.[0-9]+)?(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version '$VERSION' (expected N.N.N or N.N.N-suffix)" >&2
            exit 1
          fi
          CORE_VERSION=$(grep -m1 '<Version>' src/Sheetly.Core/Sheetly.Core.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/' | tr -d '[:space:]')
          if [ "$VERSION" != "$CORE_VERSION" ]; then
            echo "Tag says '$VERSION' but Sheetly.Core.csproj says '$CORE_VERSION'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing v$VERSION"

      # Each package carries its own <Version>; packages whose version is already on
      # nuget.org are skipped, so unchanged ones are simply not re-released.
      - name: Build
        run: dotnet build Sheetly.sln -c Release --no-incremental

      - name: Test
        run: dotnet test tests/Sheetly.Core.Tests/ -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack Sheetly.sln -c Release --no-build -o ./nupkg

      - name: Push to NuGet
        run: |
          dotnet nuget push "nupkg/*.nupkg" \
            -k "${{ secrets.NUGET_API_KEY }}" -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Sheetly v${{ steps.version.outputs.version }}
          bodyFile: docs/RELEASE_NOTES.md
          artifacts: nupkg/*.nupkg
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true
          allowUpdates: true
