name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 1.2.0'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Releasing v$VERSION"

      - name: Build
        run: dotnet build Sheetly.sln -c Release --no-incremental -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test tests/Sheetly.Core.Tests/ -c Release --no-build --verbosity normal

      - name: Pack
        run: dotnet pack Sheetly.sln -c Release --no-build -o ./nupkg -p:Version=${{ steps.version.outputs.version }}

      - name: Push to NuGet
        run: |
          dotnet nuget push "nupkg/*.${{ steps.version.outputs.version }}.nupkg" \
            -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.version }}
          name: Sheetly v${{ steps.version.outputs.version }}
          bodyFile: docs/RELEASE_NOTES.md
          artifacts: nupkg/*.nupkg
          token: ${{ secrets.GITHUB_TOKEN }}
          skipIfReleaseExists: true
          allowUpdates: true
